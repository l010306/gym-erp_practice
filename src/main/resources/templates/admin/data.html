<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据中心管理 | Gym ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.05), transparent 40%);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 { font-size: 2rem; color: var(--accent-primary); }

        .btn {
            background: var(--accent-primary);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.3); }
        .btn-seed { background: var(--accent-success); color: white; }
        .btn-delete { background: var(--accent-danger); color: white; padding: 0.4rem 0.8rem; font-size: 0.8rem; }

        /* Tabs */
        .tabs-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn.active { color: var(--accent-primary); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.6rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-primary);
            border-radius: 3px;
        }

        /* Tables */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            display: none;
        }
        .glass-card.active { display: block; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        tr:last-child td { border-bottom: none; }

        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>数据中心管理</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">直接管理数据库实体 record</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <form action="/admin/data/seed" method="post">
                    <button type="submit" class="btn btn-seed">🚀 填充测试数据</button>
                </form>
                <a href="/" class="btn" style="background: rgba(255,255,255,0.1); color: var(--text-main);">返回看板</a>
            </div>
        </div>

        <div th:if="${param.seeded}" class="glass-card active" style="margin-bottom: 1.5rem; background: rgba(34,197,94,0.1); border-color: var(--accent-success); display: block; padding: 1rem; text-align: center;">
            ✅ 测试数据已成功导入！
        </div>

        <div class="tabs-header">
            <button class="tab-btn active" onclick="showTab('members')">会员管理</button>
            <button class="tab-btn" onclick="showTab('employees')">员工管理</button>
            <button class="tab-btn" onclick="showTab('courses')">课程管理</button>
        </div>

        <!-- Members Tab -->
        <div id="members" class="glass-card active">
            <div th:if="${members.empty}" class="empty-state">没有会员数据</div>
            <table th:unless="${members.empty}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>电话</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${members}">
                        <td th:text="${m.id}">1</td>
                        <td th:text="${m.name}">张三</td>
                        <td th:text="${m.phone}">123456</td>
                        <td>
                            <form th:action="@{/admin/data/delete-member/{id}(id=${m.id})}" method="post">
                                <button type="submit" class="btn btn-delete">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Employees Tab -->
        <div id="employees" class="glass-card">
            <div th:if="${employees.empty}" class="empty-state">没有员工数据</div>
            <table th:unless="${employees.empty}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>职位</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${employees}">
                        <td th:text="${e.id}">1</td>
                        <td th:text="${e.name}">李经理</td>
                        <td th:text="${e.position}">MANAGER</td>
                        <td>
                            <form th:action="@{/admin/data/delete-employee/{id}(id=${e.id})}" method="post">
                                <button type="submit" class="btn btn-delete">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Courses Tab -->
        <div id="courses" class="glass-card">
            <div th:if="${courses.empty}" class="empty-state">没有课程数据</div>
            <table th:unless="${courses.empty}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>课程名称</th>
                        <th>类型</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${courses}">
                        <td th:text="${c.id}">1</td>
                        <td th:text="${c.name}">瑜伽</td>
                        <td th:text="${c.type}">GROUP</td>
                        <td>
                             <span th:text="${#temporals.format(c.startTime, 'HH:mm')}">10:00</span> - 
                             <span th:text="${#temporals.format(c.endTime, 'HH:mm')}">11:00</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/data/delete-course/{id}(id=${c.id})}" method="post">
                                <button type="submit" class="btn btn-delete">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.glass-card').forEach(card => card.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
