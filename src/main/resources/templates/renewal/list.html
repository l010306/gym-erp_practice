<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">续费管理 | Gym ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-warning: #fbbf24;
            --accent-danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
            padding: 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent-primary); }

        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            border-radius: 12px;
            width: fit-content;
        }

        .tab-item {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
        }

        .tab-item:hover { color: var(--text-main); }
        .tab-item.active { background: var(--accent-primary); color: var(--bg-color); font-weight: 600; }

        /* Table Style */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255, 255, 255, 0.05); text-align: left; padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: var(--accent-warning); }
        .status-approved { background: rgba(34, 197, 94, 0.2); color: var(--accent-success); }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }

        .btn {
            background: var(--accent-primary);
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.1); }

        .empty-state { padding: 4rem; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${pageTitle}">续费管理</h1>
            <a href="/" class="btn btn-outline">返回看板</a>
        </div>

        <div class="nav-tabs">
            <a href="/renewals/pending" class="tab-item" th:classappend="${!isHistory ? 'active' : ''}">待审批列表</a>
            <a href="/renewals/history" class="tab-item" th:classappend="${isHistory ? 'active' : ''}">已审批历史</a>
            <a href="/renewals/create" class="tab-item">提交新申请</a>
        </div>

        <div th:if="${error}" class="glass-card" style="margin-bottom: 2rem; border-color: var(--accent-danger); padding: 1rem; color: var(--accent-danger);">
            <p>⚠️ <span th:text="${error}">错误信息</span></p>
        </div>

        <div class="glass-card">
            <div th:if="${logs.empty}" class="empty-state">
                <p>目前没有记录。</p>
            </div>

            <table th:unless="${logs.empty}">
                <thead>
                    <tr>
                        <th>会员卡 ID</th>
                        <th>周期</th>
                        <th>新有效期</th>
                        <th>状态</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.cardId}">101</td>
                        <td>
                            <div style="font-size: 0.8rem; color: var(--text-muted);" th:text="${log.oldExpireDate}">2023-12-31</div>
                            <div style="font-size: 0.9rem;">→</div>
                        </td>
                        <td th:text="${log.newExpireDate}">2024-12-31</td>
                        <td>
                            <span class="status-badge" 
                                  th:classappend="${log.status == 'PENDING' ? 'status-pending' : (log.status == 'APPROVED' ? 'status-approved' : 'status-rejected')}"
                                  th:text="${log.status}">
                                PENDING
                            </span>
                        </td>
                        <td th:text="${log.createdAt}">2024-01-23 10:00</td>
                        <td>
                            <button th:if="${log.status == 'PENDING'}" 
                                    class="btn" 
                                    th:onclick="'handleAction(' + ${log.id} + ', \'approve\')'">
                                通过
                            </button>
                            <button th:if="${log.status == 'APPROVED'}" 
                                    class="btn btn-outline" 
                                    th:onclick="'handleAction(' + ${log.id} + ', \'revoke\')'">
                                撤销
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Hidden Forms for Actions -->
    <form id="actionForm" method="post" style="display: none;">
        <input type="hidden" name="approverId" value="3">
        <input type="hidden" name="password" id="formPassword">
    </form>

    <script>
        async function handleAction(logId, action) {
            const { value: password } = await Swal.fire({
                title: action === 'approve' ? '确认审批通过' : '确认撤销申请',
                input: 'password',
                inputLabel: '请输入经理访问密码',
                inputPlaceholder: '经理密码',
                inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
                showCancelButton: true,
                confirmButtonColor: action === 'approve' ? '#22c55e' : '#ef4444',
                confirmButtonText: '执行操作',
                cancelButtonText: '取消'
            });

            if (password) {
                const form = document.getElementById('actionForm');
                form.action = `/renewals/${logId}/${action}`;
                document.getElementById('formPassword').value = password;
                form.submit();
            }
        }
    </script>
</body>
</html>
