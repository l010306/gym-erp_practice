spring.application.name=gym-erp

# 数据库配置（生产环境推荐使用环境变量注入）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gym_erp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA 配置 - 生产环境建议使用 validate 或 none
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 如果需要本地开发，请创建 application-local.properties 并指定激活 profile
# spring.profiles.active=local
