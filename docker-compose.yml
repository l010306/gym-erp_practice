services:
  db:
    image: postgres:16-alpine
    container_name: gym-erp-db
    environment:
      POSTGRES_DB: gym_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: gym-erp-app
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gym_erp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres_password}
      SPRING_JPA_DDL_AUTO: validate
    ports:
      - "8080:8080"

volumes:
  postgres_data:
